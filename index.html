<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supreme Inventory | Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .critical { border-left: 4px solid #ef4444; background: rgba(239, 68, 68, 0.1); }
        .healthy { border-left: 4px solid #10b981; }
    </style>
</head>
<body class="p-4 md:p-8">

    <script>
        // PASTE YOUR GOOGLE DEPLOYMENT URL HERE
        const API = 'https://script.google.com/macros/s/AKfycbyjGCLI2nRblR7djUY179RcVOiXzUn5_KluAzqpPcw/exec';
    </script>

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-amber-400">INVENTORY VAULT</h1>
                <p class="text-slate-400 text-sm">Real-time Substrate & Ink Tracking</p>
            </div>
            <button onclick="loadInventory()" class="p-2 bg-slate-800 rounded-lg hover:bg-slate-700 transition">
                🔄 Refresh
            </button>
        </header>

        <div class="mb-6">
            <input type="text" id="searchInput" onkeyup="filterInventory()" placeholder="Search items (Ink, Vinyl, Scrim...)" 
                class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-amber-500">
        </div>

        <div id="inventory-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="animate-pulse text-slate-500">Connecting to Supreme Brain...</div>
        </div>
    </div>

    <script>
        let inventoryData = [];

        async function loadInventory() {
            try {
                const response = await fetch(`${API}?action=GET_FULL_INV`);
                inventoryData = await response.json();
                renderInventory(inventoryData);
            } catch (err) {
                document.getElementById('inventory-grid').innerHTML = `<p class="text-red-400">Connection Error. Check API URL.</p>`;
            }
        }

        function renderInventory(data) {
            const grid = document.getElementById('inventory-grid');
            grid.innerHTML = '';

            data.forEach(item => {
                const isCritical = item.stock.current <= item.stock.min;
                const card = document.createElement('div');
                card.className = `glass p-6 rounded-2xl ${isCritical ? 'critical' : 'healthy'}`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-lg">${item.name}</h3>
                            <p class="text-xs text-slate-500 font-mono">${item.sku}</p>
                        </div>
                        <span class="px-2 py-1 rounded text-xs font-bold ${isCritical ? 'bg-red-500 text-white' : 'bg-emerald-500/20 text-emerald-400'}">
                            ${isCritical ? 'LOW STOCK' : 'OK'}
                        </span>
                    </div>
                    <div class="mt-6 flex items-end justify-between">
                        <div>
                            <p class="text-xs text-slate-400 uppercase">Current Stock</p>
                            <p class="text-3xl font-bold">${item.stock.current} <span class="text-sm font-normal text-slate-500">${item.stock.unit}</span></p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs text-slate-500 uppercase">Min. Level</p>
                            <p class="font-semibold">${item.stock.min}</p>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterInventory() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = inventoryData.filter(i => i.name.toLowerCase().includes(term));
            renderInventory(filtered);
        }

        window.onload = loadInventory;
    </script>
</body>
</html>
